<div class="auth-card">
  <div id="auth-message" class="auth-message hidden"></div>
  <form id="form-login" class="auth-form" onsubmit="handleLogin(event)">
    <div class="field-group">
      <label for="login-email">E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" required autocomplete="email" />
    </div>
    <div class="field-group">
      <label for="login-password">Senha</label>
      <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
    </div>
    <button type="submit" class="btn-primary" id="btn-login">
      <span class="btn-text">Entrar</span>
      <span class="btn-loader hidden">⟳</span>
    </button>
  </form>
</div>

  <script>
    // Inicializa dark mode na página de login também
    (function() {
      const saved = localStorage.getItem('betel-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
