<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Papelaria Criativa — Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="auth-container">
  <div class="auth-card">

    <div class="auth-logo">
      <span class="icon">✏️</span>
      <h1>Papelaria<br>Criativa</h1>
      <p>Controle de pedidos</p>
    </div>

    <form id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com"
               required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-password" placeholder="••••••••"
               required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-primary" id="btn-login">Entrar</button>
    </form>

    <div class="auth-msg" id="auth-msg"></div>

  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
<script>
  // Redireciona se já estiver logado
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'dashboard.html';
  });

  function showMsg(text, type = 'error') {
    const el = document.getElementById('auth-msg');
    el.textContent = text;
    el.className = `auth-msg ${type} show`;
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.textContent = 'Entrando...';
    document.getElementById('auth-msg').className = 'auth-msg';

    const email    = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      showMsg('E-mail ou senha incorretos.');
      btn.disabled = false;
      btn.textContent = 'Entrar';
    } else {
      window.location.href = 'dashboard.html';
    }
  }
</script>

</body>
</html>
